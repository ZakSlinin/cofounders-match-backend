services:
  postgres:
    image: postgres:16
    env_file:
      - ./user-service/.env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./user-service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: