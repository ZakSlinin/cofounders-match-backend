services:
  postgres:
    image: postgres:16
    env_file:
      - ./user-service/.env.docker
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: cofounders_match
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    command: migrate -path migrations -database "${DB_URL}" up
    env_file:
      - ./user-service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./user-service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: